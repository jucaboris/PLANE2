  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sky Authority - Decision Rights Simulator</title>

  <style>
    :root {
      --bg-cockpit: #111111; --panel-gray: #c0c0c0; --panel-dark: #555555;
      --crt-bg: #001100; --crt-text: #39ff14; --crt-warn: #ffb000; --crt-bad: #ff3333;
      --btn-red: #d32f2f; --btn-red-dark: #9a0007; --pixel-font: 'Press Start 2P', cursive; --text-font: 'VT323', monospace;
    }
    
    html, body {
      height: 100%; margin: 0; background-color: var(--bg-cockpit); 
      color: white; font-family: var(--text-font); overflow: hidden;
    }

    /* Estilos das Novas Telas */
    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background-size: cover; background-position: center; z-index: 10;
    }
    
    #splashScreen { background-image: url('splash.png'); cursor: pointer; }
    #splashScreen p { margin-top: auto; margin-bottom: 50px; font-family: var(--pixel-font); font-size: 16px; animation: blink 1.5s infinite; text-shadow: 2px 2px #000; }

    #menuScreen, #charactersScreen, #instructionsScreen { background-image: url('splash.png'); display: none; }
    
    .modal-menu {
      background: rgba(0, 17, 0, 0.85); border: 4px inset #555; padding: 30px;
      display: flex; flex-direction: column; gap: 15px; width: 400px;
      text-align: center; font-family: var(--pixel-font);
    }
    .modal-menu h2 { color: var(--crt-text); margin-bottom: 20px; font-size: 20px;}
    .modal-menu button {
      background: #222; color: #fff; padding: 15px; font-size: 14px;
      border: 2px solid #555; cursor: pointer; text-transform: uppercase;
      font-family: var(--pixel-font);
    }
    .modal-menu button:hover { background: var(--crt-text); color: #000; }
    
    .content-screen {
      background: rgba(0, 17, 0, 0.95); border: 4px inset #555; padding: 30px;
      width: 80%; max-width: 800px; height: 70%; overflow-y: auto; color: var(--crt-text);
      font-size: 22px;
    }

    /* Estilos da Galeria de Personagens */
    .char-container { margin-top: 20px; }
    .group-title { font-family: var(--pixel-font); font-size: 16px; color: white; text-shadow: 2px 2px #000; margin-top: 40px; margin-bottom: 15px; border-bottom: 2px dashed #555; padding-bottom: 10px; text-align: left; }
    .char-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .char-card img { width: 100%; border: 3px solid #333; border-radius: 4px; transition: transform 0.2s ease, border-color 0.2s ease; cursor: pointer; }
    .char-card img:hover { transform: scale(1.05); border-color: var(--crt-text); box-shadow: 0 0 15px var(--crt-text); }

    /* Jogo Original */
    #gameScreen { 
      display: none; height: 100%; overflow-y: auto; align-items: flex-start;
      background-image: linear-gradient(#222 2px, transparent 2px), linear-gradient(90deg, #222 2px, transparent 2px);
      background-size: 30px 30px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; width: 100%; }
    .topbar { display: flex; gap: 12px; align-items: center; justify-content: space-between; padding: 16px; background-color: var(--panel-gray); border: 4px solid white; border-bottom-color: #555; border-right-color: #555; color: black; margin-bottom: 20px; }
